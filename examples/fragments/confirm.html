<div class="modal-stack__panel">
  <h2>Are you sure?</h2>
  <p>
    This layer is marked <code>dismissible: false</code>, so ESC and backdrop
    click are ignored. You have to pick an explicit answer.
  </p>
  <div class="row">
    <button data-action="click->modal-stack#pop">Confirm</button>
    <button class="secondary" data-action="click->modal-stack#pop">Cancel</button>
  </div>
</div>
